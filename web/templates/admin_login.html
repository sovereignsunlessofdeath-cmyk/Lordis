<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORDIS // Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#070b14] text-slate-200 font-sans flex items-center justify-center h-screen overflow-hidden">

    <div class="w-full max-w-md bg-[#0b1329] border border-red-500/30 p-8 rounded-2xl shadow-2xl relative">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-red-600 to-rose-500 rounded-t-2xl"></div>
        
        <span class="text-xs font-mono text-red-400 uppercase tracking-widest">Restricted Gateway</span>
        <h1 class="text-xl font-bold text-white mt-1 mb-6">ADMIN TERMINAL</h1>

        {{if .Error}}
        <div class="mb-4 bg-red-500/10 border border-red-500/30 rounded-lg p-3 text-xs font-mono text-red-400">
            {{.Error}}
        </div>
        {{end}}

        <form action="/admin/login" method="POST" class="space-y-4 font-mono text-xs">
            <div>
                <label class="block text-slate-400 mb-2 uppercase tracking-wider">Admin Email</label>
                <input type="email" name="email" value="{{.Email}}" required class="w-full bg-[#070b14] border border-[#131e3a] rounded-lg p-3 text-white focus:border-red-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-slate-400 mb-2 uppercase tracking-wider">Master Password Key</label>
                <input type="password" name="password" required class="w-full bg-[#070b14] border border-[#131e3a] rounded-lg p-3 text-white focus:border-red-500 focus:outline-none">
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg uppercase tracking-wider font-bold transition shadow-lg shadow-red-600/20">
                Authorize Admin Session
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-[#131e3a] flex justify-between items-center text-xs font-mono">
            <a href="/login" class="text-slate-400 hover:underline">&larr; Back to Staff Login</a>
            <a href="/admin/register" class="text-red-400 hover:underline uppercase tracking-wider">Admin Register</a>
        </div>
    </div>

</body>
</html>
