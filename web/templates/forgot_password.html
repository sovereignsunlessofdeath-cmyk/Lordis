<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Reset Credentials</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <span class="logo-text"
          >LOR<span class="text-red">DIS</span> Security</span
        >
      </div>

      <div class="card">
        <h1>Reset Password</h1>
        <p>
          Enter your verified corporate email address to receive password reset
          configurations.
        </p>

        {{if .Error}}
        <div class="alert-error">{{.Error}}</div>
        {{end}}

        <form action="/forgot-password" method="POST">
          <div class="input-group">
            <label for="email">Work Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="name@company.com"
              required
            />
          </div>

          <button type="submit" class="btn-primary">
            Generate Reset Token
          </button>
        </form>

        <hr class="divider" />
        <a href="/login_admin" class="link-action">Admin Login</a>
        <a href="/" class="link-action link-bold">Return to Sign In</a>
      </div>
    </div>
  </body>
</html>
