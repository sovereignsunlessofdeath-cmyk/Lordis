<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis Admin - Edit Selection</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <span class="logo-text">Modify Order #{{.Order.ID}}</span>
        </div>
        <div class="card">
            <p class="welcome-title">Staff Account: {{.Order.StaffName}}</p>
            <p>Current Choice: {{.Order.MealName}}</p>
            <form action="/admin/orders/edit" method="POST">
                <input type="hidden" name="order_id" value="{{.Order.ID}}">
                <div class="input-group">
                    <label for="meal_name">Select Alternative Menu Item</label>
                    <select id="meal_name" name="meal_name" required>
                        <option value="PARTY RICE WITH CHICKEN">PARTY RICE WITH CHICKEN</option>
                        <option value="PARTY RICE WITH BEEF">PARTY RICE WITH BEEF</option>
                        <option value="JOLLOF + FRIED RICE + CROAKER">JOLLOF + FRIED RICE + CROAKER</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Update Meal Choice</button>
            </form>
            <hr class="divider">
            <a href="/admin/orders" class="link-action">Cancel Modifications</a>
        </div>
    </div>
</body>
</html>
