<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Admin Registration</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <span class="logo-text"
          >LOR<span class="text-red">DIS</span>
          <span class="logo-admin-tag">ADMIN</span></span
        >
      </div>
      <div class="card">
        <h1>Admin Registration</h1>
        <p>
          Enter the admin registration key to create a new administrator
          account.
        </p>
        {{if .Error}}
        <div class="alert-error">{{.Error}}</div>
        {{end}}
        <form action="/admin/register" method="POST">
          <div class="input-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Daniel Example"
              required
            />
          </div>
          <div class="input-group">
            <label for="email">Administrator Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="admin@company.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="input-group">
            <label for="admin_key">Admin Registration Key</label>
            <input
              type="password"
              id="admin_key"
              name="admin_key"
              placeholder="Enter your admin key"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Register Admin</button>
        </form>
        <hr class="divider" />
        <a href="/login_admin" class="link-action">Back to Admin Login</a>
        <a href="/login" class="link-action">Staff Login</a>
      </div>
    </div>
  </body>
</html>
