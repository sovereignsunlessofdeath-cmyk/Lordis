<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis Admin - Manage Orders</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="body-padding">

    <div class="container">
        <!-- Identity Header Section -->
        <div class="logo-container header-left-aligned">
            <div class="logo-badge">
                LORD<span class="logo-red">IS</span> Kitchen Log
                <span class="logo-admin-tag">ADMIN</span>
            </div>
            <p class="header-subtext" style="margin-top: 4px; font-size: 13px; color: var(--text-muted);">
                Active daily staff meal selections.
            </p>
        </div>

        <h1 class="section-title" style="margin-top: 16px;">Daily Selections</h1>

        <!-- Core Loop for Daily Selections -->
        {{range .AllOrders}}
        <div class="card card-compact admin-card">
            <div class="card-header-row flex-row-space">
                <strong class="card-staff-title" style="font-size: 15px; color: var(--black);">
                    Staff: {{.StaffName}}
                </strong>
                <a href="/admin/orders/edit?id={{.ID}}" class="card-action-link link-action link-bold" style="font-size: 13px;">
                    Modify Selection
                </a>
            </div>
            <p class="card-selection-text" style="margin-top: 8px; margin-bottom: 0; font-size: 14px; color: var(--red, #e53e3e); font-weight: 600;">
                {{.MealName}}
            </p>
        </div>
        {{else}}
        <div class="card card-compact">
            <p style="margin-bottom: 0; text-align: center; color: var(--text-muted); font-size: 13px;">
                No staff meal entries logged for today.
            </p>
        </div>
        {{end}}

        <!-- Master Admin Navigation Bar -->
        <nav class="nav-bottom">
            <a href="/admin/tickets" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span>Manage Requests</span>
            </a>
            <a href="/admin/orders" class="nav-item active">
                <span class="nav-icon">🍔</span>
                <span>Manage Orders</span>
            </a>
        </nav>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
