<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis Admin - Manage Orders</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="body-bottom-padding">

    <div class="container">
        <!-- Identity Header Section -->
        <div class="logo-container header-left-aligned">
            <span class="logo-text">LOR<span class="text-red">DIS</span> Kitchen Log</span>
            <p class="header-subtext">Active daily staff meal selections.</p>
        </div>

        <h1 class="section-title">Daily Selections</h1>

        <!-- Core Loop for Daily Selections -->
        {{range .AllOrders}}
        <div class="card admin-card">
            <div class="card-header-row">
                <strong class="card-staff-title">Staff: {{.StaffName}}</strong>
                <a href="/admin/orders/edit?id={{.ID}}" class="card-action-link">Modify Selection</a>
            </div>
            <p class="card-selection-text">{{.MealName}}</p>
        </div>
        {{else}}
        <p class="header-subtext">No staff meal entries logged for today.</p>
        {{end}}

        <!-- Master Admin Navigation Bar -->
        <nav class="nav-bottom">
            <a href="/admin/tickets" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span>Manage Requests</span>
            </a>
            <a href="/admin/orders" class="nav-item active">
                <span class="nav-icon">🍔</span>
                <span>Manage Orders</span>
            </a>
        </nav>
    </div>

</body>
</html>
