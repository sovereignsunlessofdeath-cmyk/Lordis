<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis - Admin Access</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <span class="logo-text">LOR<span class="text-red">DIS</span> <span class="logo-admin-tag">ADMIN</span></span>
        </div>
        <div class="card">
            <h1>Admin Portal</h1>
            <p>Authorized personnel only. Secure terminal authentication required.</p>
            {{if .Error}}
            <div class="alert-error">{{.Error}}</div>
            {{end}}
            <form action="/admin/login" method="POST">
                <div class="input-group">
                    <label for="email">Administrator Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@company.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Security Credentials</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Access Management Console</button>
            </form>
            <hr class="divider">
            <a href="/" class="link-action">Return to Staff Portal</a>
        </div>
    </div>
</body>
</html>
