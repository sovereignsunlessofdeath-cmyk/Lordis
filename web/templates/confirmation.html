<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Order Complete</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <span class="logo-text">LORD<span class="logo-red">IS</span></span>
      </div>

      <div class="card" style="text-align: center;">
        <div style="font-size: 48px; line-height: 1; color: var(--red, #e53e3e); margin-bottom: 12px;">
          ✓
        </div>

        <h1 style="margin-bottom: 6px;">Meal Request Recorded</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
          Your weekly food request has been captured for the selected day.
        </p>

        <!-- Receipt Summary Block -->
        <div class="card card-compact" style="text-align: left; background-color: var(--gray-bg); border: 1px solid var(--gray-border); padding: 16px; margin-bottom: 20px;">
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div>
              <span style="display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px;">Name</span>
              <strong style="font-size: 15px; color: var(--black);">
                {{if .Name}}{{.Name}}{{else}}Staff Member{{end}}
              </strong>
            </div>

            <hr style="border: none; border-top: 1px dashed var(--gray-border); margin: 0;" />

            <div>
              <span style="display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px;">Day</span>
              <strong style="font-size: 15px; color: var(--black);">
                {{if .Day}}{{.Day}}{{else}}Selected Day{{end}}
              </strong>
            </div>

            <hr style="border: none; border-top: 1px dashed var(--gray-border); margin: 0;" />

            <div>
              <span style="display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px;">Meal Choice</span>
              <strong style="font-size: 15px; color: var(--red, #e53e3e);">
                {{if .Meal}}{{.Meal}}{{else}}Meal Choice{{end}}
              </strong>
            </div>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          <a href="/order" class="btn-primary">Edit Request</a>
          <a href="/search-food" class="link-action" style="margin-top: 4px;">Return to Dashboard</a>
        </div>
      </div>
    </div>

    <script src="/static/js/main.js"></script>
  </body>
</html>
