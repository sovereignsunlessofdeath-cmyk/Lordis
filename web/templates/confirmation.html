<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Order Complete</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card logo-container">
        <div class="logo-text text-red">✓</div>
        <h1>Meal Request Recorded</h1>
        <p>Your weekly food request has been captured for the selected day.</p>
        <div class="card card-compact">
          <span class="logo-admin-tag">Name</span>
          <strong class="welcome-title"
            >{{if .Name}}{{.Name}}{{else}}Staff Member{{end}}</strong
          >
        </div>
        <div class="card card-compact">
          <span class="logo-admin-tag">Day</span>
          <strong class="welcome-title"
            >{{if .Day}}{{.Day}}{{else}}Selected Day{{end}}</strong
          >
        </div>
        <div class="card card-compact">
          <span class="logo-admin-tag">Meal</span>
          <strong class="welcome-title"
            >{{if .Meal}}{{.Meal}}{{else}}Meal Choice{{end}}</strong
          >
        </div>
        <a href="/order" class="btn-primary">Edit Request</a>
        <a href="/search-food" class="link-action">Return to Dashboard</a>
      </div>
    </div>
  </body>
</html>
