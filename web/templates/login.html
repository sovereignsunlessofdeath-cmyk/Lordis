<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORDIS // Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#070b14] text-slate-200 font-sans flex items-center justify-center h-screen overflow-hidden">

    <div class="w-full max-w-md bg-[#0b1329] border border-[#131e3a] p-8 rounded-2xl shadow-2xl relative">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 to-indigo-500 rounded-t-2xl"></div>
        
        <span class="text-xs font-mono text-blue-400 uppercase tracking-widest">Access Control</span>
        <h1 class="text-xl font-bold text-white mt-1 mb-6">LORDIS TERMINAL</h1>

        {{if .Error}}
        <div class="mb-4 bg-red-500/10 border border-red-500/30 rounded-lg p-3 text-xs font-mono text-red-400">
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST" class="space-y-4 font-mono text-xs">
            <div>
                <label class="block text-slate-400 mb-2 uppercase tracking-wider">User Email</label>
                <input type="email" name="email" value="{{.Email}}" required class="w-full bg-[#070b14] border border-[#131e3a] rounded-lg p-3 text-white focus:border-blue-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-slate-400 mb-2 uppercase tracking-wider">Password Key</label>
                <input type="password" name="password" required class="w-full bg-[#070b14] border border-[#131e3a] rounded-lg p-3 text-white focus:border-blue-500 focus:outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg uppercase tracking-wider font-bold transition shadow-lg shadow-blue-600/20">
                Initialize Login
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-[#131e3a] flex justify-between items-center text-xs font-mono">
            <span class="text-slate-500">New staff? <a href="/register" class="text-blue-400 hover:underline">Create Account</a></span>
            <a href="/admin/login" class="text-red-400 hover:underline uppercase tracking-wider">Admin Portal &rarr;</a>
        </div>
    </div>

</body>
</html>
