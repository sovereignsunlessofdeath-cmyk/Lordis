<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis - My Orders</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="body-padding">
    <div class="container">
        <div class="logo-left">
            <span class="logo-text">My <span class="text-red">Orders</span></span>
            <p class="logo-admin-tag">Track your submitted meal requests below.</p>
        </div>
        {{range .Orders}}
        <div class="card card-compact">
            <div class="flex-row-space">
                <span class="welcome-title">Order #{{.OrderNumber}}</span>
                <span class="text-red link-bold">{{.Status}}</span>
            </div>
            <p class="welcome-title">{{.MealName}}</p>
            <span class="logo-admin-tag">Submitted: {{.Date}}</span>
        </div>
        {{else}}
        <p class="logo-admin-tag">You haven't placed any food orders today.</p>
        {{end}}
        <nav class="nav-bottom">
            <a href="/search-food" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="/submit-ticket" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span>Requests</span>
            </a>
            <a href="/order-history" class="nav-item active">
                <span class="nav-icon">🕒</span>
                <span>Orders</span>
            </a>
            <a href="/profile" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>
    </div>
</body>
</html>
