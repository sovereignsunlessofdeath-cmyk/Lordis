<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Submit Request</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="body-padding">
    <div class="container">
      <div class="logo-left">
        <span class="logo-text"
          >LOR<span class="text-red">DIS</span> Requests</span
        >
        <p class="logo-admin-tag">
          Submit official gate passes or company resource requests.
        </p>
      </div>

      <div class="card">
        <h1>Log New Request</h1>
        <p>Fill out the details below to notify administration.</p>

        <form action="/submit-ticket" method="POST">
          <div class="input-group">
            <label for="category">Request Type</label>
            <select id="category" name="category" required>
              <option value="Gate Pass">
                Gate Pass (Permission to Exit Facility)
              </option>
              <option value="Company Provision">
                Company Provision / Supply Request
              </option>
              <option value="Official Leave">Official Leave / Time Off</option>
            </select>
          </div>

          <div class="input-group">
            <label for="description">Reason / Justification</label>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="Specify your reasons or items requested..."
              required
            />
          </div>

          <button type="submit" class="btn-primary">
            Submit Request to Admin
          </button>
        </form>
      </div>

      <nav class="nav-bottom">
        <a href="/search-food" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </a>
        <a href="/submit-ticket" class="nav-item active">
          <span class="nav-icon">🎫</span>
          <span>Requests</span>
        </a>
        <a href="/order-history" class="nav-item">
          <span class="nav-icon">🕒</span>
          <span>Orders</span>
        </a>
        <a href="/profile" class="nav-item">
          <span class="nav-icon">👤</span>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </body>
</html>
