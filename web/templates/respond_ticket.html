<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis Admin - Authorize Request</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <span class="logo-text">Action File #{{.ID}}</span>
      </div>
      <div class="card">
        <p><strong>Employee:</strong> {{.Name}}</p>
        <p><strong>Log Type:</strong> {{.Category}}</p>
        <div class="alert-error">{{.Description}}</div>
        <form action="/respond_ticket/{{.ID}}" method="POST">
          <input type="hidden" name="ticket_id" value="{{.ID}}" />
          <div class="input-group">
            <label for="status">Administrative Decision</label>
            <select id="status" name="status" required>
              <option value="Approved / Authorized">Approve / Authorize</option>
              <option value="Declined / Deferred">Decline / Defer</option>
              <option value="Under Review">Hold For Review</option>
            </select>
          </div>
          <div class="input-group">
            <label for="message">Official Directives / Remarks</label>
            <textarea
              id="message"
              name="message"
              rows="4"
              placeholder="Enter gate conditions..."
              required
            ></textarea>
          </div>
          <button type="submit" class="btn-primary">Commit Decision</button>
        </form>
        <hr class="divider" />
        <a href="/tickets" class="link-action">Back to Request Feed</a>
      </div>
    </div>
  </body>
</html>
