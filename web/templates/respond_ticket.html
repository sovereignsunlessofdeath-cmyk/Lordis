<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis Admin - Authorize Request</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container"><span class="logo-text">Action File #{{.Ticket.ID}}</span></div>
        <div class="card">
            <p><strong>Employee:</strong> {{.Ticket.StaffName}}</p>
            <p><strong>Log Type:</strong> {{.Ticket.Category}}</p>
            <div class="alert-error">{{.Ticket.Description}}</div>
            <form action="/admin/tickets/respond" method="POST">
                <input type="hidden" name="ticket_id" value="{{.Ticket.ID}}">
                <div class="input-group">
                    <label for="status">Administrative Decision</label>
                    <select id="status" name="status" required>
                        <option value="Approved / Authorized">Approve / Authorize</option>
                        <option value="Declined / Deferred">Decline / Defer</option>
                        <option value="Under Review">Hold For Review</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="response">Official Directives / Remarks</label>
                    <input type="text" id="response" name="response" placeholder="Enter gate conditions..." required>
                </div>
                <button type="submit" class="btn-primary">Commit Decision</button>
            </form>
            <hr class="divider">
            <a href="/admin/tickets" class="link-action">Back to Request Feed</a>
        </div>
    </div>
</body>
</html>
