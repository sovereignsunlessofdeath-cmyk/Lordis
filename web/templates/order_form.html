<div class="bg-industrial-900 border border-industrial-800 rounded-xl p-8 max-w-4xl shadow-xl">
    <div class="mb-6 pb-4 border-b border-industrial-800">
        <span class="text-xs font-mono text-blue-400 uppercase tracking-widest">Logistics Module</span>
        <h2 class="text-xl font-bold text-white mt-1">Weekly Meal Selection Matrix</h2>
        <p class="text-xs text-slate-400 mt-1 font-mono">Specify exact daily food parameters (1 item per day, Monday through Friday).</p>
    </div>

    <form action="/orders/submit" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-industrial-950 p-4 rounded-lg border border-industrial-800">
                <label class="block text-xs font-mono uppercase tracking-wider text-blue-400 mb-2">Monday Selection</label>
                <input type="text" name="monday" placeholder="e.g., Jollof Rice & Grilled Chicken" required class="w-full bg-industrial-900 border border-industrial-800 rounded-md p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="bg-industrial-950 p-4 rounded-lg border border-industrial-800">
                <label class="block text-xs font-mono uppercase tracking-wider text-blue-400 mb-2">Tuesday Selection</label>
                <input type="text" name="tuesday" placeholder="e.g., Fried Rice & Fish" required class="w-full bg-industrial-900 border border-industrial-800 rounded-md p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="bg-industrial-950 p-4 rounded-lg border border-industrial-800">
                <label class="block text-xs font-mono uppercase tracking-wider text-blue-400 mb-2">Wednesday Selection</label>
                <input type="text" name="wednesday" placeholder="e.g., Amala & Gbegiri" required class="w-full bg-industrial-900 border border-industrial-800 rounded-md p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="bg-industrial-950 p-4 rounded-lg border border-industrial-800">
                <label class="block text-xs font-mono uppercase tracking-wider text-blue-400 mb-2">Thursday Selection</label>
                <input type="text" name="thursday" placeholder="e.g., Pounded Yam & Egusi" required class="w-full bg-industrial-900 border border-industrial-800 rounded-md p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="md:col-span-2 bg-industrial-950 p-4 rounded-lg border border-industrial-800">
                <label class="block text-xs font-mono uppercase tracking-wider text-blue-400 mb-2">Friday Selection</label>
                <input type="text" name="friday" placeholder="e.g., Rice & Stew" required class="w-full bg-industrial-900 border border-industrial-800 rounded-md p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
            </div>

        </div>

        <div>
            <label class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Special Dietary Directives / Notes</label>
            <textarea name="notes" rows="3" placeholder="Additional instructions for kitchen staff..." class="w-full bg-industrial-950 border border-industrial-800 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-blue-500 transition"></textarea>
        </div>

        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-mono text-xs tracking-wider uppercase px-6 py-3 rounded-lg font-medium transition shadow-lg shadow-blue-600/20">
                COMMIT WEEKLY ORDER
            </button>
        </div>
    </form>
</div>
