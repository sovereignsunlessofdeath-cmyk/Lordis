<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - Account Overview</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="body-padding">
    <div class="container">
      <div class="logo-left">
        <span class="logo-text">LORD<span class="logo-red">IS</span></span>
      </div>

      <div class="card profile-header">
        <div class="profile-avatar">
          {{if .Staff.Name}}{{printf "%.1s" .Staff.Name}}{{else}}U{{end}}
        </div>
        <div>
          <h2 class="welcome-title" style="margin-bottom: 2px;">{{.Staff.Name}}</h2>
          <p style="margin-bottom: 0; font-size: 13px; color: var(--text-muted);">{{.Staff.Email}}</p>
        </div>
      </div>

      <h2 class="sub-section-title">Order Feed Logs</h2>
      
      {{if .Orders}}
        {{range .Orders}}
        <div class="card card-compact">
          <div class="flex-row-space">
            <span class="welcome-title" style="margin-bottom: 0;">{{.MealName}}</span>
            <span style="font-size: 12px; color: var(--text-muted); font-weight: 500;">{{.Date}}</span>
          </div>
        </div>
        {{end}}
      {{else}}
        <div class="card card-compact">
          <p style="margin-bottom: 0; text-align: center; color: var(--text-muted);">
            No recent orders found.
          </p>
        </div>
      {{end}}

      <div class="card card-compact" style="margin-top: 24px;">
        <a href="/logout" class="btn-primary btn-danger" style="text-align: center;">Log Out</a>
      </div>

      <nav class="nav-bottom">
        <a href="/search-food" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </a>
        <a href="/submit-ticket" class="nav-item">
          <span class="nav-icon">🎫</span>
          <span>Requests</span>
        </a>
        <a href="/order-history" class="nav-item">
          <span class="nav-icon">🕒</span>
          <span>Orders</span>
        </a>
        <a href="/profile" class="nav-item active">
          <span class="nav-icon">👤</span>
          <span>Profile</span>
        </a>
      </nav>
    </div>

    <script src="/static/js/main.js"></script>
  </body>
</html>
