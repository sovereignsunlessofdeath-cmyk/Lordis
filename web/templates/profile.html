<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lordis - My Account</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="body-padding">
    <div class="container">
      <div class="logo-left"><span class="logo-text">My Account</span></div>
      <div class="card profile-header">
        <div class="profile-avatar">S</div>
        <div>
          <h2 class="welcome-title">{{.Staff.Name}}</h2>
          <p class="logo-admin-tag">{{.Staff.Email}}</p>
        </div>
      </div>
      <div class="profile-banner">
        <span>Duty Status</span>
        <strong>Active On-Site</strong>
        <span>Verified Faculty Staff Account</span>
      </div>
      <div class="card profile-options">
        <div class="card card-compact">
          <h3 class="welcome-title">Notifications</h3>
          {{range .Notifications}}
          <div class="card card-compact">
            <strong>{{.Title}}</strong>
            <p class="logo-admin-tag">{{.Message}}</p>
            <span class="logo-admin-tag">{{.CreatedAt}}</span>
          </div>
          {{else}}
          <p class="logo-admin-tag">No notifications yet.</p>
          {{end}}
        </div>
        <hr class="divider" />
        <a href="/logout" class="link-action flex-row-space text-red">
          <span class="link-bold">🚪 Logout</span><span>→</span>
        </a>
      </div>
      <nav class="nav-bottom">
        <a href="/search-food" class="nav-item"
          ><span class="nav-icon">🏠</span><span>Home</span></a
        >
        <a href="/submit-ticket" class="nav-item"
          ><span class="nav-icon">🎫</span><span>Requests</span></a
        >
        <a href="/order-history" class="nav-item"
          ><span class="nav-icon">🕒</span><span>Orders</span></a
        >
        <a href="/profile" class="nav-item active"
          ><span class="nav-icon">👤</span><span>Profile</span></a
        >
      </nav>
    </div>
  </body>
</html>
