<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lordis - My Account</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="body-padding">
    <div class="container">
        <div class="logo-left"><span class="logo-text">My Account</span></div>
        <div class="card profile-header">
            <div class="profile-avatar">S</div>
            <div>
                <h2 class="welcome-title">{{.Staff.Name}}</h2>
                <p class="logo-admin-tag">{{.Staff.Email}}</p>
            </div>
        </div>
        <div class="profile-banner">
            <span>Duty Status</span>
            <strong>Active On-Site</strong>
            <span>Verified Faculty Staff Account</span>
        </div>
        <div class="card profile-options">
            <a href="/history" class="link-action flex-row-space">
                <span class="link-bold">📋 View My Activity History</span><span>→</span>
            </a>
            <hr class="divider">
            <a href="/logout" class="link-action flex-row-space text-red">
                <span class="link-bold">🚪 Log Out of System</span><span>→</span>
            </a>
        </div>
        <nav class="nav-bottom">
            <a href="/search-food" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
            <a href="/submit-ticket" class="nav-item"><span class="nav-icon">🎫</span><span>Requests</span></a>
            <a href="/history" class="nav-item"><span class="nav-icon">🕒</span><span>Orders</span></a>
            <a href="/profile" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
        </nav>
    </div>
</body>
</html>
